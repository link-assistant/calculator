name: Install wasm-pack
description: Install a pinned wasm-pack release binary without relying on the moving installer script.

inputs:
  version:
    description: wasm-pack version to install.
    required: false
    default: 0.15.0

runs:
  using: composite
  steps:
    - name: Download wasm-pack
      shell: bash
      env:
        WASM_PACK_VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail
        archive="wasm-pack-v${WASM_PACK_VERSION}-x86_64-unknown-linux-musl.tar.gz"
        url="https://github.com/wasm-bindgen/wasm-pack/releases/download/v${WASM_PACK_VERSION}/${archive}"
        curl -sSL "$url" -o "$archive"
        tar -xzf "$archive"
        mkdir -p "$HOME/.cargo/bin"
        cp "wasm-pack-v${WASM_PACK_VERSION}-x86_64-unknown-linux-musl/wasm-pack" "$HOME/.cargo/bin/wasm-pack"
        chmod +x "$HOME/.cargo/bin/wasm-pack"
        wasm-pack --version
